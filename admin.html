<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AdLink Pro - HQ Admin Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #060713; color: white; font-family: 'Inter', sans-serif; display: none; }
        .admin-card { background-color: #0b0c1e; border: 1px solid rgba(168, 85, 247, 0.1); border-radius: 1.25rem; }
        .table-row:hover { background-color: rgba(255, 255, 255, 0.02); }
    </style>
</head>
<body class="min-h-screen bg-[#060713]">

    <header class="border-b border-gray-800/60 bg-[#0b0c1e]/80 backdrop-blur-md sticky top-0 z-50 px-6 py-4">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <div class="w-9 h-9 bg-gradient-to-tr from-red-600 to-purple-600 rounded-xl flex items-center justify-center shadow-lg">
                    <i class="fas fa-user-shield text-white text-sm"></i>
                </div>
                <div>
                    <h1 class="text-base font-bold tracking-wide">AdLink Pro <span class="text-red-500 text-xs font-medium ml-1 bg-red-500/10 px-2 py-0.5 rounded-full border border-red-500/20">HQ Admin</span></h1>
                    <p class="text-[10px] text-gray-500">Secure Access Management</p>
                </div>
            </div>
            <a href="index.html" class="text-xs bg-gray-900 border border-gray-800 px-4 py-2 rounded-xl transition flex items-center gap-2">
                <i class="fas fa-arrow-left text-gray-400"></i> Main Dashboard
            </a>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 py-8 space-y-8">
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="admin-card p-6 space-y-4">
                <h3 class="text-sm font-bold text-gray-200 flex items-center gap-2">
                    <i class="fas fa-bullhorn text-purple-400"></i> Update Notice Board
                </h3>
                <textarea id="input-notice" rows="2" class="w-full bg-gray-950/50 border border-gray-800 rounded-xl p-3 text-xs focus:outline-none focus:border-purple-500 text-gray-300" placeholder="ইউজারদের ড্যাশবোর্ডের জন্য নতুন নোটিশ লিখুন..."></textarea>
                <button id="save-notice-btn" class="w-full bg-purple-600 hover:bg-purple-700 text-white text-xs font-bold py-2.5 rounded-xl transition flex items-center justify-center gap-2">
                    <i class="fas fa-paper-plane"></i> Publish Notice
                </button>
            </div>

            <div class="admin-card p-6 space-y-4">
                <h3 class="text-sm font-bold text-gray-200 flex items-center gap-2">
                    <i class="fab fa-telegram-plane text-[#24A1DE]"></i> Telegram Community Link
                </h3>
                <input id="input-telegram" type="url" class="w-full bg-gray-950/50 border border-gray-800 rounded-xl p-3 text-xs focus:outline-none focus:border-blue-500 text-gray-300" placeholder="https://t.me/your_group_link">
                <button id="save-telegram-btn" class="w-full bg-blue-600 hover:bg-blue-700 text-white text-xs font-bold py-2.5 rounded-xl transition flex items-center justify-center gap-2">
                    <i class="fas fa-save"></i> Save Telegram Link
                </button>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="admin-card p-6 flex items-center justify-between">
                <div>
                    <p class="text-xs font-semibold text-gray-400 uppercase tracking-wider">Total Signed In</p>
                    <h3 id="stat-total-users" class="text-3xl font-black text-white mt-2">0</h3>
                </div>
                <div class="w-12 h-12 bg-blue-500/10 border border-blue-500/20 rounded-2xl flex items-center justify-center text-blue-400 text-xl"><i class="fas fa-users"></i></div>
            </div>
            <div class="admin-card p-6 flex items-center justify-between">
                <div>
                    <p class="text-xs font-semibold text-gray-400 uppercase tracking-wider">Active Workers</p>
                    <h3 id="stat-active-workers" class="text-3xl font-black text-green-400 mt-2">0</h3>
                </div>
                <div class="w-12 h-12 bg-green-500/10 border border-green-500/20 rounded-2xl flex items-center justify-center text-green-400 text-xl"><i class="fas fa-running"></i></div>
            </div>
        </div>

        <div class="admin-card p-6 overflow-hidden">
            <h2 class="text-sm font-bold text-gray-200 mb-4 flex items-center gap-2"><i class="fas fa-users-cog text-red-500"></i> User Control Management</h2>
            <div class="overflow-x-auto rounded-xl border border-gray-800/40">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-[#12132a] border-b border-gray-800 text-[11px] text-gray-400 uppercase font-bold tracking-wider">
                            <th class="p-4">User</th>
                            <th class="p-4">Points</th>
                            <th class="p-4">Total Clicks</th>
                            <th class="p-4 text-center">Action Zone</th>
                        </tr>
                    </thead>
                    <tbody id="admin-users-tbody" class="text-xs divide-y divide-gray-800/40">
                        <tr><td colspan="4" class="p-8 text-center text-gray-600">Loading users data...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

<script type="module">
    import { db, auth } from './firebase-config.js';
    import { collection, getDocs, doc, deleteDoc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    // 🎯 হাসান ভাই, এখানে আপনার আসল অ্যাডমিন জিমেইল আইডিটি বসিয়ে দিবেন
    const SUPER_ADMIN_EMAIL = "shohozvashay@gmail.com"; 

    // সিকিউরিটি গেট লক
    auth.onAuthStateChanged(async (user) => {
        if (user && user.email === SUPER_ADMIN_EMAIL) {
            document.body.style.display = "block";
            loadSettings();
            fetchSystemStats();
        } else {
            alert("⚠️ Access Denied! You are not authorized.");
            window.location.href = "index.html";
        }
    });

    // নোটিশ ও টেলিগ্রাম ডাটা ইনপুট বক্সে প্রিলোড করা
    async function loadSettings() {
        const docSnap = await getDoc(doc(db, "system", "settings"));
        if (docSnap.exists()) {
            const data = docSnap.data();
            if (data.notice) document.getElementById('input-notice').value = data.notice;
            if (data.telegram_url) document.getElementById('input-telegram').value = data.telegram_url;
        }
    }

    // নোটিশ পাবলিশ বাটন অ্যাকশন
    document.getElementById('save-notice-btn').addEventListener('click', async () => {
        const txt = document.getElementById('input-notice').value;
        try {
            await setDoc(doc(db, "system", "settings"), { notice: txt }, { merge: true });
            alert("✅ নোটিশ সফলভাবে ওয়েবসাইটে লাইভ করা হয়েছে!");
        } catch (e) { alert("ত্রুটি হয়েছে!"); }
    });

    // টেলিগ্রাম লিংক সেভ বাটন অ্যাকশন
    document.getElementById('save-telegram-btn').addEventListener('click', async () => {
        const url = document.getElementById('input-telegram').value;
        try {
            await setDoc(doc(db, "system", "settings"), { telegram_url: url }, { merge: true });
            alert("✅ টেলিগ্রাম গ্রুপ লিংক সাকসেসফুলি আপডেট হয়েছে!");
        } catch (e) { alert("ত্রুটি হয়েছে!"); }
    });

    // লাইভ ইউজার ও মেট্রি can ডাটা ফেচিং
    async function fetchSystemStats() {
        const tbody = document.getElementById('admin-users-tbody');
        try {
            const querySnapshot = await getDocs(collection(db, "users"));
            let totalUsers = 0, activeWorkers = 0, rowsHtml = "";

            querySnapshot.forEach((userDoc) => {
                totalUsers++;
                const uData = userDoc.data();
                const uId = userDoc.id;

                const name = uData.displayName || "User";
                const email = uData.email || "No Email";
                const photo = uData.photoURL || `https://i.pravatar.cc/100?u=${uId}`;
                const points = uData.points || 0;
                const clicks = uData.total_clicks || 0;

                if (clicks > 0) activeWorkers++;

                rowsHtml += `
                    <tr class="table-row transition" id="row-${uId}">
                        <td class="p-4">
                            <div class="flex items-center space-x-3">
                                <img src="${photo}" class="w-8 h-8 rounded-full border border-purple-500/20">
                                <div>
                                    <p class="font-bold text-gray-200">${name}</p>
                                    <p class="text-[10px] text-gray-500">${email}</p>
                                </div>
                            </div>
                        </td>
                        <td class="p-4 font-mono text-yellow-500 font-bold">${points} Pts</td>
                        <td class="p-4 font-mono text-gray-300">${clicks} Clicks</td>
                        <td class="p-4 text-center">
                            <button data-id="${uId}" data-name="${name}" class="remove-user-btn bg-red-600/10 hover:bg-red-600 text-red-400 hover:text-white px-3 py-1.5 rounded-xl text-[10px] font-bold transition">
                                <i class="fas fa-user-minus"></i> Remove
                            </button>
                        </td>
                    </tr>
                `;
            });

            document.getElementById('stat-total-users').innerText = totalUsers;
            document.getElementById('stat-active-workers').innerText = activeWorkers;
            tbody.innerHTML = totalUsers === 0 ? `<tr><td colspan="4" class="p-4 text-center">No Users</td></tr>` : rowsHtml;
            attachDeleteEvents();
        } catch (err) { tbody.innerHTML = `<tr><td colspan="4" class="p-4 text-center text-red-500">Error loading data.</td></tr>`; }
    }

    function attachDeleteEvents() {
        document.querySelectorAll('.remove-user-btn').forEach(btn => {
            btn.addEventListener('click', async () => {
                const id = btn.getAttribute('data-id');
                const name = btn.getAttribute('data-name');
                if (confirm(`আপনি কি নিশ্চিত ভাবে "${name}" কে রিমুভ করতে চান?`)) {
                    await deleteDoc(doc(db, "users", id));
                    document.getElementById(`row-${id}`).remove();
                    fetchSystemStats();
                }
            });
        });
    }
</script>
</body>
</html>
