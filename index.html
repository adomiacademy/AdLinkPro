    // 🌟 নতুন আপডেট করা টাস্ক ক্লিক হ্যান্ডলার (ইন-অ্যাপ সিকিউর মোডাল ও সেফ পপ-আপ লজিক)

        // ১. মেইন পেজের বাটনের ইন্টারফেস চেইঞ্জ (ইন-প্রোগ্রেস স্টেট)

        // 🚀 অ্যাডটি সেফ উপায়ে নতুন ট্যাবে ওপেন করা হলো (যাতে সাদা স্ক্রিন না আসে)

        // ২. সিকিউর ইন-অ্যাপ লেয়ার ওপেন ও অবজেক্ট ফ্রেম হাইড করে ইনফো নোটিশ দেওয়া

                    <i class="fas fa-bullhorn text-purple-400"></i>
                </div>
                <h2 id="notice-status-title" class="text-base lg:text-lg font-bold text-white mb-2">বিজ্ঞাপনটি নতুন ট্যাবে ওপেন হয়েছে!</h2>
                <p id="notice-status-desc" class="text-xs text-gray-400 max-w-sm leading-relaxed">পয়েন্ট পেতে নতুন ট্যাবে যাওয়া বিজ্ঞাপনটি দেখুন। ১০ সেকেন্ড শেষ হলে একটি সাউন্ড অ্যালার্ট বাজবে, তখন এই ট্যাবে ফিরে আসুন।</p>
            `;
            adFrame.parentNode.appendChild(infoNotice);
        }

        modal.classList.remove('hidden');

        // ৩. রিয়েল-টাইম ইন-অ্যাপ টাইমার ইন্টারভাল ট্র্যাকিং
        const countdownInterval = setInterval(() => {
            timeLeft--;
            const countdownLabel = document.getElementById('modal-countdown');
            if (countdownLabel) {
                countdownLabel.innerText = `${timeLeft}s Remaining`;

            if (timeLeft <= 0) {
                clearInterval(countdownInterval);

                // 🔔 ব্রাউজারের নিজস্ব অডিও কনটেক্সট দিয়ে সাউন্ড বাজানো (ইউজার অন্য ট্যাবে থাকলেও শুনতে পাবে)
                try {
                    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                    const oscillator = audioCtx.createOscillator();
                    const gainNode = audioCtx.createGain();
                    
                    oscillator.connect(gainNode);
                    gainNode.connect(audioCtx.destination);
                    
                    oscillator.type = 'sine';
                    oscillator.frequency.setValueAtTime(587.33, audioCtx.currentTime); // D5 নোট (মিষ্টি টিউন)
                    gainNode.gain.setValueAtTime(0.5, audioCtx.currentTime);
                    
                    oscillator.start();
                    oscillator.stop(audioCtx.currentTime + 0.3); 
                } catch (audioErr) {
                    console.log("Audio notification blocked or not supported", audioErr);
                }

                // মোডালের ভেতরের টেক্সট ক্লেইমের জন্য আপডেট

                // ৫. ক্লোজ এবং পয়েন্ট ক্রেডিট বাটন জেনারেট
                timerZone.innerHTML = `

    async function processPointsSubmission(index) {
        const modal = document.getElementById('ad-secure-modal');
        const currentBtn = document.getElementById(`task-btn-${index}`);
        const nextBtn = document.getElementById(`task-btn-${index + 1}`);
        const user = auth.currentUser;

        if (user) {
            try {
                // ১. ভিউয়ারের ব্যালেন্সে ১ পয়েন্ট যোগ করা
                const viewerRef = doc(db, "users", user.uid);
                await updateDoc(viewerRef, {
                    points: increment(1),
                    total_clicks: increment(1)
                });

                // ২. লিংকের আসল মালিকের ব্যালেন্স থেকে ১ পয়েন্ট কাটা (যদি এডমিন লিংক না হয়)
                const ownerUid = fetchedLinks[index].ownerUid;
                if (ownerUid !== "system_admin" && ownerUid !== user.uid) {
                    const ownerRef = doc(db, "users", ownerUid);
                    await updateDoc(ownerRef, { points: increment(-1) });
                }

                // ৩. স্ক্রিনের টপ হেডার ব্যালেন্স লাইভ আপডেট
                let currentPts = parseInt(document.getElementById('header-points').innerText);
                document.getElementById('header-points').innerText = currentPts + 1;

            } catch (err) {
                document.getElementById('header-points').innerText = currentPts + 1;
            }
        }

        // ৪. মেইন স্ক্রিনের বাটন কমপ্লিট স্টেটে রূপান্তর
        currentBtn.className = "px-3.5 py-1.5 rounded-xl text-[10px] lg:text-[11px] font-bold link-btn-completed";
        currentBtn.innerHTML = `<i class="fas fa-check-circle mr-1"></i> Done`;

        completedCount++;
        document.getElementById('progress-text').innerText = `Visits: ${completedCount}/10`;
        currentActiveIndex++;

        // ৫. পরবর্তী বাটন থাকলে সেটি আনলক করা
        if (index < 9 && nextBtn) {
            nextBtn.disabled = false;
            nextBtn.className = "px-3.5 py-1.5 rounded-xl text-[10px] lg:text-[11px] font-bold link-btn-active";
            nextBtn.innerHTML = `<i class="fas fa-play mr-1.5 text-[9px]"></i> Visit #${index + 2}`;
        }

        // ৬. ১০টি টাস্ক কমপ্লিট হলে বোনাস ১০ পয়েন্ট প্রদান
        if (completedCount === 10 && user) {
            const nextTenBtn = document.getElementById('next-ten-btn');
            nextTenBtn.disabled = false;
            nextTenBtn.className = "bg-purple-600 hover:bg-purple-700 text-white px-5 py-2 rounded-xl text-xs font-bold transition shadow-lg shadow-purple-500/20";
            
            try {
                const viewerRef = doc(db, "users", user.uid);
                await updateDoc(viewerRef, { points: increment(10) });
                alert("১০টি টাস্ক সফলভাবে শেষ করায় আপনার ব্যালেন্সে ১০ বোনাস পয়েন্ট যোগ হয়েছে! 🎉");
            } catch (bonusErr) {
                console.error("Bonus credit failed:", bonusErr);
            }
        }

        // ৭. মোডাল হাইড ও অবজেক্ট ডেটা ক্লিয়ার
        modal.classList.add('hidden');
        document.getElementById('ad-content-frame').data = "";
        
        const infoNotice = document.getElementById('ad-info-notice');
        if (infoNotice) infoNotice.remove();
    }

    // 🎯 গ্লোবাল ফলো ফাংশন
    window.followUser = async function(targetUid, btnElement) {
        const currentUser = auth.currentUser;
        if (!currentUser) {
            alert("দয়া করে আগে লগইন করুন!");
            return;
        }

        if (currentUser.uid === targetUid) {
            alert("আপনি নিজেকে নিজে ফলো করতে পারবেন না ভাই!");
            return;
        }

        btnElement.innerText = "Processing...";
        btnElement.disabled = true;

        try {
            const myRef = doc(db, "users", currentUser.uid);
            const targetRef = doc(db, "users", targetUid);

            await updateDoc(myRef, {
                following_list: arrayUnion(targetUid),
                following_count: increment(1)
            });

            await updateDoc(targetRef, {
                followers_count: increment(1)
            });

            const targetedCard = document.getElementById(`home-user-card-${targetUid}`);
            if (targetedCard) {
                targetedCard.style.opacity = '0';
                targetedCard.style.transition = 'opacity 0.2s ease';
                setTimeout(() => {
                    targetedCard.remove();
                    const container = document.getElementById('users-list-container');
                    if (container && container.children.length === 0) {
                        container.innerHTML = `<p class="text-xs text-gray-600 text-center py-4">No new members to follow.</p>`;
                    }
                }, 200);
            }

        } catch (err) {
            console.error("Follow error:", err);
            alert("ফলো করতে সমস্যা হয়েছে, আবার চেষ্টা করুন।");
            btnElement.innerText = "Follow";
            btnElement.disabled = false;
        }
    };

    document.getElementById('next-ten-btn').addEventListener('click', () => {
        const popup = document.getElementById('loading-popup');
        popup.classList.remove('hidden');
        setTimeout(() => {
            loadTrafficExchangeLinks(auth.currentUser.uid);
            popup.classList.add('hidden');
        }, 1500);
    });
</script>
</body>
